      tailwind.config = {

    <style>
      body { font-family: "Inter", system-ui, sans-serif; }
      .icon { width: 17px; height: 17px; stroke-width: 1.75; }
      .icon-sm { width: 13px; height: 13px; stroke-width: 1.75; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
      .nav-item.active { background-color: #0f172a; color: #ffffff; }
      .nav-item:not(.active):hover { background-color: #f1f5f9; }
      .fade-in { animation: fadeIn 0.15s ease-in; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      #sidebar { transition: transform 0.2s ease; }
      #overlay { display: none; }
      #overlay.open { display: block; }
      .report-doc { font-family: Georgia, "Times New Roman", Times, serif; color: #1a1a1a; line-height: 1.5; }
      .report-doc table { border-collapse: collapse; width: 100%; }
      .report-doc th, .report-doc td { border: 1px solid #444; padding: 6px 9px; font-size: 12.5px; text-align: left; vertical-align: top; }
      .report-doc th { background: #eeeeee; font-weight: 600; }
      .report-doc h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.02em; text-align: center; margin: 0 0 2px; }
      .report-doc h2 { font-size: 13.5px; font-weight: 700; margin: 22px 0 8px; padding-bottom: 4px; border-bottom: 1.5px solid #1a1a1a; text-transform: uppercase; letter-spacing: 0.03em; }
      .report-doc p { font-size: 12.5px; margin: 0 0 8px; }
      .report-preview-shell .report-doc h1 { font-size: 13px; }
      .report-preview-shell .report-doc h2 { font-size: 9.5px; margin: 12px 0 5px; }
      .report-preview-shell .report-doc p { font-size: 9.5px; margin: 0 0 5px; }
      .report-preview-shell .report-doc th, .report-preview-shell .report-doc td { font-size: 8.5px; padding: 3px 5px; }
      /* ---- image upload area ---- */
      .img-upload-label { display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1.5px dashed #cbd5e1; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #64748b; transition: border-color .15s, background .15s; }
      .img-upload-label:hover { border-color: #94a3b8; background: #f8fafc; }
      .img-preview-wrap { position: relative; display: inline-block; margin-top: 8px; }
      .img-preview-wrap img { max-height: 120px; border-radius: 8px; border: 1px solid #e2e8f0; display: block; }
      .img-preview-wrap .remove-img { position: absolute; top: -6px; right: -6px; background: #0f172a; color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; }
      /* announcement card image */
      .ann-card-img { margin-top: 10px; border-radius: 8px; max-width: 100%; width: 100%; max-height: 420px; object-fit: contain; background: #f8fafc; border: 1px solid #e2e8f0; display: block; }
      @media print {
        body.printing-report > *:not(#report-print-area) { display: none !important; }
        #report-print-area { display: block !important; padding: 0 !important; }
        @page { margin: 18mm 16mm; }
        .report-doc tr { break-inside: avoid; }
        .report-doc table { break-inside: auto; }
        .report-doc h2 { break-after: avoid; }
        .report-doc h1, .report-doc > p:first-of-type { break-after: avoid; }
      }
      @media (max-width: 767px) {
        #sidebar { position: fixed; inset: 0 auto 0 0; transform: translateX(-100%); z-index: 40; width: 260px; }
        #sidebar.open { transform: translateX(0); }
      }
    </style>

    function nextId(prefix, list) { return `${prefix}-${String(list.length+1).padStart(3,'0')}`; }
    function today() { return new Date().toISOString().slice(0,10); }
    function clubNames() { return state.clubs.map(c=>c.name); }
    function esc(str) {
      return String(str??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]);
    }

    const STATUS_STYLES = {

      excused:'bg-amber-50 text-amber-700 border-amber-200',
    };
    function pill(value) {
      const cls = STATUS_STYLES[String(value).toLowerCase()]||'bg-slate-100 text-slate-600 border-slate-200';
      return `<span class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-medium ${cls}">${esc(value)}</span>`;

    function table(columns, rows, emptyLabel) {
      const head = columns.map(c=>`<th class="px-4 py-2.5 font-medium text-slate-500 whitespace-nowrap">${esc(c.label)}</th>`).join('');
      let body;
      if(!rows.length) {
        body = `<tr><td colspan="${columns.length}" class="px-4 py-8 text-center text-slate-400">${esc(emptyLabel||'No records yet.')}</td></tr>`;
      } else {
        body = rows.map(row=>{
          const cells = columns.map(c=>`<td class="px-4 py-2.5 text-slate-700 whitespace-nowrap">${c.render?c.render(row):esc(row[c.key])}</td>`).join('');
          return `<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50">${cells}</tr>`;
        }).join('');
      }
      return `<div class="overflow-x-auto"><table class="w-full text-sm text-left">
<thead><tr class="border-b border-slate-200 bg-slate-50">${head}</tr></thead>
<tbody>${body}</tbody></table></div>`;
    }

    function field(labelText, inputHtml) {
      return `<label class="flex flex-col gap-1 text-sm"><span class="text-slate-600 font-medium">${esc(labelText)}</span>${inputHtml}</label>`;
    }
    function textInput(id, labelText, opts={}) {
      const type = opts.type||'text';
      return field(labelText, `<input id="${id}" type="${type}" ${opts.step?`step="${opts.step}"`:''}${opts.min!==undefined?` min="${opts.min}"`:''}placeholder="${esc(opts.placeholder||'')}" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400">`);
    }
    function selectInput(id, labelText, options) {
      const opts = options.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
      return field(labelText, `<select id="${id}" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400 bg-white">${opts}</select>`);
    }
    function submitButton(labelText) {
      return `<button type="submit" class="inline-flex items-center gap-1.5 bg-slate-900 text-white text-sm font-medium px-3.5 py-2 rounded-md hover:bg-slate-700 transition-colors">${icon('plus','icon')} ${esc(labelText)}</button>`;

    function card(inner, extraClass) {

        <input type="checkbox" data-report-section="${s.key}" ${state.reportSections[s.key]?'checked':''} class="rounded border-slate-300 text-slate-900 focus:ring-slate-400">
        ${esc(s.label)}
      </label>`).join('')}
      <button type="button" id="rpt-sections-all" class="text-xs text-slate-500 underline underline-offset-2 hover:text-slate-800">Select all</button>
      <button type="button" id="rpt-sections-none" class="text-xs text-slate-500 underline underline-offset-2 hover:text-slate-800">Clear all</button>
    </div>
  </div>
  <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
    <p class="text-xs text-slate-400">Preview — full report shown below</p>
    <div class="flex flex-wrap gap-2">
      <button id="btn-download-pdf" type="button" class="inline-flex items-center gap-1.5 bg-slate-900 text-white text-xs font-medium px-3 py-1.5 rounded-md hover:bg-slate-700 transition-colors">${icon('download','icon')} PDF / Print</button>
      <button id="btn-download-word" type="button" class="inline-flex items-center gap-1.5 bg-white border border-slate-300 text-slate-700 text-xs font-medium px-3 py-1.5 rounded-md hover:bg-slate-50 transition-colors">${icon('download','icon')} Word</button>
    </div>
  </div>
  <!-- No max-height cap — preview shows the full report; outer page scroll handles overflow -->
  <div class="report-preview-shell border border-slate-200 rounded-lg bg-slate-50 p-3">
    <div class="bg-white border border-slate-200 rounded-md p-4 shadow-sm" id="report-preview">
      ${buildReportHTML(state.reportPeriod)}
    </div>
  </div>
</div>`);

      return `${sectionHeader('Analytics','Visual summary of club activity, membership, budget, attendance, and volunteer data.')}${kpiStrip}${chartsGrid}${reportSection}`;
    }

    /* ---------- Chart helpers ---------- */
    const chartInstances={};
    function destroyChart(id){ if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];} }
    let chartDefaultsSet=false;
    function setChartDefaults(){
      if(chartDefaultsSet||typeof Chart==='undefined')return;
      Chart.defaults.font.family="'Inter',system-ui,-apple-system,sans-serif";
      Chart.defaults.font.size=11;Chart.defaults.color='#64748b';
      Chart.defaults.plugins.tooltip.backgroundColor='#0f172a';
      Chart.defaults.plugins.tooltip.titleColor='#f8fafc';
      Chart.defaults.plugins.tooltip.bodyColor='#e2e8f0';
      Chart.defaults.plugins.tooltip.padding=10;Chart.defaults.plugins.tooltip.cornerRadius=8;
      Chart.defaults.plugins.tooltip.displayColors=false;
      Chart.defaults.plugins.tooltip.titleFont={weight:'600',size:12};
      Chart.defaults.plugins.tooltip.bodyFont={size:11.5};
      chartDefaultsSet=true;
    }
    function baseChartOptions(extra){ return Object.assign({responsive:true,maintainAspectRatio:false,layout:{padding:{top:2}},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:5,boxHeight:5,padding:8,font:{size:9},color:'#475569'}}}},extra||{}); }
    function niceScale(axis,extra){ return Object.assign({beginAtZero:true,ticks:{precision:0,color:'#94a3b8',font:{size:9}},grid:{color:'#f1f5f9',drawTicks:false,display:axis==='y'},border:{display:false}},extra||{}); }
    function categoryScale(extra){ return Object.assign({ticks:{color:'#64748b',font:{size:9}},grid:{display:false,drawTicks:false},border:{display:false}},extra||{}); }
    function countBy(list,key){ const map={}; list.forEach(item=>{ const k=item[key]; map[k]=(map[k]||0)+1; }); return map; }

    function renderAnalyticsCharts(){
      if(typeof Chart==='undefined')return;
      setChartDefaults();
      ['chart-category','chart-members','chart-budget','chart-attendance','chart-volunteer','chart-elections'].forEach(destroyChart);
      const doughnutOptions=()=>baseChartOptions({cutout:'68%',radius:'85%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:5,boxHeight:5,padding:7,font:{size:9},color:'#475569'}}}});
      const doughnutDataset=data=>Object.assign({borderWidth:3,borderColor:'#ffffff',hoverOffset:6,spacing:2},data);

      const categoryCounts=countBy(state.clubs,'category');
      chartInstances['chart-category']=new Chart(document.getElementById('chart-category'),{type:'doughnut',data:{labels:Object.keys(categoryCounts),datasets:[doughnutDataset({data:Object.values(categoryCounts),backgroundColor:[CHART_COLORS.blue,CHART_COLORS.teal,CHART_COLORS.violet,CHART_COLORS.orange,CHART_COLORS.amber,CHART_COLORS.rose]})]},options:doughnutOptions()});

      const memberCounts=countBy(state.members,'club');
      const memberEntries=Object.entries(memberCounts).sort((a,b)=>b[1]-a[1]);
      chartInstances['chart-members']=new Chart(document.getElementById('chart-members'),{type:'bar',data:{labels:memberEntries.map(([club])=>club),datasets:[{label:'Members',data:memberEntries.map(([,count])=>count),backgroundColor:CHART_COLORS.violet,borderRadius:6,borderSkipped:false,maxBarThickness:18}]},options:baseChartOptions({indexAxis:'y',plugins:{legend:{display:false}},scales:{x:niceScale('x'),y:categoryScale()}})});

      const budgetCounts=countBy(state.budget,'status');
      chartInstances['chart-budget']=new Chart(document.getElementById('chart-budget'),{type:'doughnut',data:{labels:Object.keys(budgetCounts),datasets:[doughnutDataset({data:Object.values(budgetCounts),backgroundColor:Object.keys(budgetCounts).map(s=>({pending:CHART_COLORS.amber,approved:CHART_COLORS.emerald,rejected:CHART_COLORS.rose})[s]||CHART_COLORS.slate)})]},options:doughnutOptions()});

      const attendanceCounts=countBy(state.attendance,'status');
      chartInstances['chart-attendance']=new Chart(document.getElementById('chart-attendance'),{type:'doughnut',data:{labels:Object.keys(attendanceCounts),datasets:[doughnutDataset({data:Object.values(attendanceCounts),backgroundColor:Object.keys(attendanceCounts).map(s=>({present:CHART_COLORS.emerald,absent:CHART_COLORS.rose,excused:CHART_COLORS.amber})[s]||CHART_COLORS.slate)})]},options:doughnutOptions()});

      const volunteerTotals={};
      state.volunteer.forEach(v=>{ volunteerTotals[v.student]=(volunteerTotals[v.student]||0)+Number(v.hours||0); });
      const volunteerEntries=Object.entries(volunteerTotals).sort((a,b)=>b[1]-a[1]);
      chartInstances['chart-volunteer']=new Chart(document.getElementById('chart-volunteer'),{type:'bar',data:{labels:volunteerEntries.map(([student])=>student),datasets:[{label:'Hours',data:volunteerEntries.map(([,hrs])=>hrs),backgroundColor:CHART_COLORS.teal,borderRadius:6,borderSkipped:false,maxBarThickness:18}]},options:baseChartOptions({indexAxis:'y',plugins:{legend:{display:false}},scales:{x:niceScale('x'),y:categoryScale()}})});

      const electionCounts=countBy(state.elections,'status');
      chartInstances['chart-elections']=new Chart(document.getElementById('chart-elections'),{type:'bar',data:{labels:Object.keys(electionCounts),datasets:[{label:'Candidacies',data:Object.values(electionCounts),backgroundColor:Object.keys(electionCounts).map(s=>({pending:CHART_COLORS.amber,approved:CHART_COLORS.emerald,rejected:CHART_COLORS.rose})[s]||CHART_COLORS.slate),borderRadius:6,borderSkipped:false,maxBarThickness:46}]},options:baseChartOptions({plugins:{legend:{display:false}},scales:{y:niceScale('y'),x:categoryScale()}})});
    }

    /* ---------- Report builder ---------- */
    const REPORT_SECTION_DEFS = [
      {key:'summary',label:'Executive Summary'},
      {key:'events',label:'Events Held'},
      {key:'attendance',label:'Attendance'},
      {key:'budget',label:'Budget Requests'},
      {key:'volunteer',label:'Volunteer Service Hours'},
      {key:'achievements',label:'Achievements'},
    ];
    const ROMAN_NUMERALS = ['I','II','III','IV','V','VI','VII','VIII'];
    const PERIOD_LABELS={weekly:'Weekly Report',monthly:'Monthly Report',yearly:'Annual Report'};
    function getPeriodRange(period){
      const now=new Date(); let start,end;
      if(period==='weekly'){end=new Date(now);start=new Date(now);start.setDate(start.getDate()-6);}
      else if(period==='yearly'){start=new Date(now.getFullYear(),0,1);end=new Date(now.getFullYear(),11,31);}
      else{start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
      start.setHours(0,0,0,0);end.setHours(23,59,59,999);
      return{start,end,generatedAt:now};
    }
    function inRange(dateStr,start,end){const d=new Date(dateStr);if(isNaN(d))return false;return d>=start&&d<=end;}
    function fmtLong(d){return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}
    function fmtShort(dateStr){const d=new Date(dateStr);if(isNaN(d))return esc(dateStr);return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
    function peso(amountStr){const n=Number(String(amountStr).replace(/,/g,''))||0;return 'PHP '+n.toLocaleString('en-US');}

    function reportTable(headers,rows){
      const head=headers.map(h=>`<th>${esc(h)}</th>`).join('');
      const body=rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${headers.length}" style="text-align:center;color:#777;">No records for this period.</td></tr>`;
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    /* ---------- Category grouping helpers for the report ---------- */
    function clubCategory(clubName){
      const c = state.clubs.find(cl=>cl.name===clubName);
      return c ? c.category : 'Uncategorized';
    }
    function eventClubMap(){
      const map={};
      state.events.forEach(e=>{ map[e.title]=e.club; });
      return map;
    }
    function groupBy(list, keyFn){
      const map={};
      list.forEach(item=>{
        const k=keyFn(item)||'Uncategorized';
        (map[k]=map[k]||[]).push(item);
      });
      return map;
    }
    function sortedCategoryKeys(map){ return Object.keys(map).sort((a,b)=>a.localeCompare(b)); }

    function categoryOverviewTable(map, extraColLabel, extraFn){
      const keys=sortedCategoryKeys(map);
      if(!keys.length) return '';
      const headers=extraColLabel?['Category','Count',extraColLabel]:['Category','Count'];
      const rows=keys.map(cat=>{
        const items=map[cat];
        return extraFn?[esc(cat),items.length,extraFn(items)]:[esc(cat),items.length];
      });
      return reportTable(headers,rows);
    }

    function buildEventsSection(events, groupByCategory){
      if(!groupByCategory) return reportTable(['Date','Club','Event','Location'],events.map(e=>[fmtShort(e.date),esc(e.club),esc(e.title),esc(e.location)]));
      const groups=groupBy(events, e=>clubCategory(e.club));
      const keys=sortedCategoryKeys(groups);
      if(!keys.length) return `<p style="font-size:12.5px;color:#777;">No events for this period.</p>`;
      const overview=categoryOverviewTable(groups,'Events');
      const details=keys.map(cat=>{
        const rows=groups[cat];
        const tbl=reportTable(['Date','Club','Event','Location'],rows.map(e=>[fmtShort(e.date),esc(e.club),esc(e.title),esc(e.location)]));
        return `<p style="font-weight:700;font-size:12.5px;margin:12px 0 4px;">${esc(cat)} (${rows.length} event${rows.length===1?'':'s'})</p>${tbl}`;
      }).join('');
      return `<p style="font-size:11px;color:#555;margin:0 0 4px;">Category overview:</p>${overview}${details}`;
    }

    function buildBudgetSection(budget, groupByCategory){
      if(!groupByCategory) return reportTable(['Date Requested','Club','Purpose','Amount','Status'],budget.map(b=>[fmtShort(b.requested),esc(b.club),esc(b.purpose),peso(b.amount),esc(b.status)]));
      const groups=groupBy(budget, b=>clubCategory(b.club));
      const keys=sortedCategoryKeys(groups);
      if(!keys.length) return `<p style="font-size:12.5px;color:#777;">No budget requests for this period.</p>`;
      const amountOf=b=>Number(String(b.amount).replace(/,/g,''))||0;
      const overview=categoryOverviewTable(groups,'Total amount',items=>peso(items.reduce((s,b)=>s+amountOf(b),0)));
      const details=keys.map(cat=>{
        const rows=groups[cat];
        const subtotal=rows.reduce((s,b)=>s+amountOf(b),0);
        const tbl=reportTable(['Date Requested','Club','Purpose','Amount','Status'],rows.map(b=>[fmtShort(b.requested),esc(b.club),esc(b.purpose),peso(b.amount),esc(b.status)]));
        return `<p style="font-weight:700;font-size:12.5px;margin:12px 0 4px;">${esc(cat)} — Subtotal: ${peso(subtotal)}</p>${tbl}`;
      }).join('');
      return `<p style="font-size:11px;color:#555;margin:0 0 4px;">Category overview:</p>${overview}${details}`;
    }

    function buildAttendanceSection(attendance, groupByCategory){
      if(!groupByCategory) return reportTable(['Event','Student','Status','Time In','Time Out'],attendance.map(a=>[esc(a.event),esc(a.student),esc(a.status),esc(a.timeIn),esc(a.timeOut)]));
      const evMap=eventClubMap();
      const groups=groupBy(attendance, a=>clubCategory(evMap[a.event]||''));
      const keys=sortedCategoryKeys(groups);
      if(!keys.length) return `<p style="font-size:12.5px;color:#777;">No attendance records for this period.</p>`;
      const details=keys.map(cat=>{
        const rows=groups[cat];
        const counts=countBy(rows,'status');
        const tbl=reportTable(['Event','Student','Status','Time In','Time Out'],rows.map(a=>[esc(a.event),esc(a.student),esc(a.status),esc(a.timeIn),esc(a.timeOut)]));
        return `<p style="font-weight:700;font-size:12.5px;margin:12px 0 4px;">${esc(cat)} — Present: ${counts.present||0}, Absent: ${counts.absent||0}, Excused: ${counts.excused||0}</p>${tbl}`;
      }).join('');
      return details;
    }

    function buildAchievementsSection(achievements, groupByCategory){
      if(!groupByCategory) return reportTable(['Date','Club','Title','Level'],achievements.map(a=>[fmtShort(a.date),esc(a.club),esc(a.title),esc(a.level)]));
      const groups=groupBy(achievements, a=>clubCategory(a.club));
      const keys=sortedCategoryKeys(groups);
      if(!keys.length) return `<p style="font-size:12.5px;color:#777;">No achievements for this period.</p>`;
      const overview=categoryOverviewTable(groups,'Achievements');
      const details=keys.map(cat=>{
        const rows=groups[cat];
        const tbl=reportTable(['Date','Club','Title','Level'],rows.map(a=>[fmtShort(a.date),esc(a.club),esc(a.title),esc(a.level)]));
        return `<p style="font-weight:700;font-size:12.5px;margin:12px 0 4px;">${esc(cat)} (${rows.length})</p>${tbl}`;
      }).join('');
      return `<p style="font-size:11px;color:#555;margin:0 0 4px;">Category overview:</p>${overview}${details}`;
    }

    function collectPeriodData(period){
      const{start,end,generatedAt}=getPeriodRange(period);
      const events=state.events.filter(e=>inRange(e.date,start,end));
      const eventTitleSet=new Set(events.map(e=>e.title));
      const attendance=state.attendance.filter(a=>eventTitleSet.has(a.event));
      const budget=state.budget.filter(b=>inRange(b.requested,start,end));
      const volunteer=state.volunteer.filter(v=>inRange(v.date,start,end));
      const achievements=state.achievements.filter(a=>inRange(a.date,start,end));
      const attendanceCounts=countBy(attendance,'status');
      const budgetTotal=budget.reduce((sum,b)=>sum+(Number(String(b.amount).replace(/,/g,''))||0),0);
      const volunteerTotal=volunteer.reduce((sum,v)=>sum+Number(v.hours||0),0);
      return{start,end,generatedAt,events,attendance,budget,volunteer,achievements,attendanceCounts,budgetTotal,volunteerTotal};
    }

    function buildReportHTML(period){
      const d=collectPeriodData(period);
      const meta=state.reportMeta;
      const activeClubs=state.clubs.filter(c=>c.status==='active').length;
      const groupByCategory = state.reportGroupByCategory;
      const sections = state.reportSections;

      /* Build only the sections that are checked. Numbered dynamically so it reads
         cleanly whether it's the full report or just one part (e.g. Attendance only). */
      const sectionHtmlByKey = {
        summary: ()=>`<h2>__NUM__. Executive Summary</h2><p>This report covers co-curricular club activity from <strong>${fmtLong(d.start)}</strong> to <strong>${fmtLong(d.end)}</strong>. As of this period, the program has ${activeClubs} active club(s) with ${state.members.length} registered member(s) across all organizations. Within the covered period, ${d.events.length} event(s) were held, ${d.volunteer.length} volunteer service entr${d.volunteer.length===1?'y was':'ies were'} logged totaling ${d.volunteerTotal} hour(s), ${d.budget.length} budget request(s) were filed amounting to ${peso(d.budgetTotal)}, and ${d.achievements.length} achievement(s) were recorded.</p>`,
        events: ()=>`<h2>__NUM__. Events Held${groupByCategory?' (by Category)':''}</h2>${buildEventsSection(d.events, groupByCategory)}`,
        attendance: ()=>`<h2>__NUM__. Attendance${groupByCategory?' (by Category)':''}</h2><p>Of ${d.attendance.length} attendance record(s) logged against these events: ${d.attendanceCounts.present||0} present, ${d.attendanceCounts.absent||0} absent, ${d.attendanceCounts.excused||0} excused.</p>${buildAttendanceSection(d.attendance, groupByCategory)}`,
        budget: ()=>`<h2>__NUM__. Budget Requests${groupByCategory?' (by Category)':''}</h2>${buildBudgetSection(d.budget, groupByCategory)}`,
        volunteer: ()=>`<h2>__NUM__. Volunteer Service Hours</h2>${reportTable(['Date','Student','Club','Activity','Hours','Verified By'],d.volunteer.map(v=>[fmtShort(v.date),esc(v.student),esc(v.club),esc(v.activity),esc(v.hours),esc(v.verifiedBy)]))}`,
        achievements: ()=>`<h2>__NUM__. Achievements${groupByCategory?' (by Category)':''}</h2>${buildAchievementsSection(d.achievements, groupByCategory)}`,
      };
      const includedKeys = REPORT_SECTION_DEFS.filter(s=>sections[s.key]).map(s=>s.key);
      const bodyHtml = includedKeys.length
        ? includedKeys.map((key,i)=>sectionHtmlByKey[key]().replace('__NUM__',ROMAN_NUMERALS[i]||String(i+1))).join('')
        : `<p style="color:#777;text-align:center;padding:24px 0;">No sections selected. Check at least one section above to build the report.</p>`;

      const institutionLine=meta.institution?`<p style="text-align:center;font-size:12.5px;margin:0 0 2px;">${esc(meta.institution)}</p>`:'';
      const scopeNote = includedKeys.length && includedKeys.length<REPORT_SECTION_DEFS.length
        ? `<p style="text-align:center;font-size:10.5px;color:#777;margin:0 0 10px;">Showing: ${includedKeys.map(k=>esc(REPORT_SECTION_DEFS.find(s=>s.key===k).label)).join(', ')}</p>`
        : '';
      return `<div class="report-doc">
${institutionLine}
<h1>Co-Curricular Activities Report</h1>
<p style="text-align:center;margin:0 0 4px;font-size:12.5px;">${esc(PERIOD_LABELS[period])} &nbsp;&middot;&nbsp; ${fmtLong(d.start)} to ${fmtLong(d.end)}</p>
${scopeNote}
<p style="text-align:right;font-size:11px;color:#555;margin:0 0 14px;">Generated ${fmtLong(d.generatedAt)}</p>
${bodyHtml}
<div style="display:flex;justify-content:space-between;margin-top:56px;">
  <div style="width:45%;text-align:center;"><div style="border-top:1px solid #1a1a1a;padding-top:4px;font-size:12.5px;">${esc(meta.preparedBy)||'&nbsp;'}<br><span style="font-size:11px;color:#555;">${esc(meta.preparedByTitle)}</span></div></div>
  <div style="width:45%;text-align:center;"><div style="border-top:1px solid #1a1a1a;padding-top:4px;font-size:12.5px;">${esc(meta.notedBy)||'&nbsp;'}<br><span style="font-size:11px;color:#555;">${esc(meta.notedByTitle)}</span></div></div>
</div></div>`;
    }

    function syncReportMetaFromInputs(){
      const byId=id=>document.getElementById(id);
      if(!byId('rpt-institution'))return;
      state.reportMeta.institution=val('rpt-institution');
      state.reportMeta.preparedBy=val('rpt-prepared-by');
      state.reportMeta.notedBy=val('rpt-noted-by');
    }
    function printReport(period){
      syncReportMetaFromInputs();
      const area=document.getElementById('report-print-area');
      area.innerHTML=buildReportHTML(period);
      document.body.classList.add('printing-report');
      window.print();
    }
    window.addEventListener('afterprint',()=>{
      document.body.classList.remove('printing-report');
      document.getElementById('report-print-area').innerHTML='';
    });
    function downloadWordReport(period){
      syncReportMetaFromInputs();
      const bodyHtml=buildReportHTML(period);
      const doc=`<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>Co-Curricular Activities Report</title>
<style>
  body { margin: 0; padding: 0; }
  .report-doc { font-family: Georgia, "Times New Roman", Times, serif; color: #1a1a1a; line-height: 1.5; font-size: 12.5px; }
  .report-doc table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .report-doc th, .report-doc td { border: 1px solid #444; padding: 6px 9px; font-size: 12.5px; text-align: left; vertical-align: top; }
  .report-doc th { background: #eeeeee; font-weight: 600; }
  .report-doc h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.02em; text-align: center; margin: 0 0 2px; }
  .report-doc h2 { font-size: 13.5px; font-weight: 700; margin: 22px 0 8px; padding-bottom: 4px; border-bottom: 1.5px solid #1a1a1a; text-transform: uppercase; letter-spacing: 0.03em; }
  .report-doc p { font-size: 12.5px; margin: 0 0 8px; }
</style>
</head><body>${bodyHtml}</body></html>`;
      const blob=new Blob(['\ufeff',doc],{type:'application/msword'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`co-curricular-${period}-report-${today()}.doc`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    }

    const VIEWS={dashboard:viewDashboard,analytics:viewAnalytics,directory:viewDirectory,registration:viewRegistration,memberships:viewMemberships,elections:viewElections,events:viewEvents,achievements:viewAchievements,budget:viewBudget,announcements:viewAnnouncements,volunteer:viewVolunteer};

    /* ---------- Render + event wiring ---------- */
    function render(){
      renderNav();
      const label=NAV_ITEMS.find(n=>n.id===currentTab)?.label||'';
      document.getElementById('mobile-title').textContent=label;
      const el=document.getElementById('view');
      el.classList.remove('fade-in');
      el.innerHTML=VIEWS[currentTab]();
      void el.offsetWidth;
      el.classList.add('fade-in');
      wireView();
    }

    function wireView(){
      const byId=id=>document.getElementById(id);

      if(currentTab==='analytics'){
        renderAnalyticsCharts();
        const meta=state.reportMeta;
        if(byId('rpt-institution'))byId('rpt-institution').value=meta.institution;
        if(byId('rpt-prepared-by'))byId('rpt-prepared-by').value=meta.preparedBy;
        if(byId('rpt-noted-by'))byId('rpt-noted-by').value=meta.notedBy;
        const refreshPreview=()=>{
          syncReportMetaFromInputs();
          const preview=byId('report-preview');
          if(preview)preview.innerHTML=buildReportHTML(state.reportPeriod);
        };
        ['rpt-institution','rpt-prepared-by','rpt-noted-by'].forEach(id=>byId(id)?.addEventListener('input',refreshPreview));
        byId('rpt-group-category')?.addEventListener('change',e=>{ state.reportGroupByCategory=e.target.checked; refreshPreview(); });
        document.querySelectorAll('[data-report-section]').forEach(cb=>{
          cb.addEventListener('change',()=>{
            state.reportSections[cb.getAttribute('data-report-section')]=cb.checked;
            refreshPreview();
          });
        });
        byId('rpt-sections-all')?.addEventListener('click',()=>{
          REPORT_SECTION_DEFS.forEach(s=>state.reportSections[s.key]=true);
          render();
        });
        byId('rpt-sections-none')?.addEventListener('click',()=>{
          REPORT_SECTION_DEFS.forEach(s=>state.reportSections[s.key]=false);
          render();
        });
        document.querySelectorAll('[data-period]').forEach(btn=>{
          btn.addEventListener('click',()=>{ syncReportMetaFromInputs(); state.reportPeriod=btn.getAttribute('data-period'); render(); });
        });
        byId('btn-download-pdf')?.addEventListener('click',()=>printReport(state.reportPeriod));
        byId('btn-download-word')?.addEventListener('click',()=>downloadWordReport(state.reportPeriod));
      }

      if(currentTab==='dashboard'){
        byId('go-volunteer')?.addEventListener('click',()=>{ currentTab='volunteer'; render(); });
      }

      if(currentTab==='directory'){
        byId('directory-search')?.addEventListener('input',e=>{
          state.query=e.target.value; render();
          byId('directory-search').focus();
          byId('directory-search').selectionStart=byId('directory-search').value.length;
        });
      }

      if(currentTab==='registration'){
        byId('registration-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const name=val('reg-name'),adviser=val('reg-adviser'),established=val('reg-established');
          if(!name||!adviser||!established)return;
          state.clubs.push({id:nextId('CLB',state.clubs),name,category:val('reg-category'),adviser,established,status:'pending'});
          render();
        });
      }

      if(currentTab==='memberships'){
        byId('membership-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const student=val('mem-student'); if(!student)return;
          state.members.push({id:nextId('MEM',state.members),club:val('mem-club'),student,role:val('mem-role'),joined:today(),status:'active'});
          render();
        });
      }

      if(currentTab==='elections'){
        byId('election-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const position=val('elc-position'),candidate=val('elc-candidate'); if(!position||!candidate)return;
          state.elections.push({id:nextId('ELC',state.elections),club:val('elc-club'),position,candidate,term:val('elc-term')||'SY 2025-2026',votes:0,status:'pending'});
          render();
        });
        document.querySelectorAll('[data-decide]').forEach(btn=>{
          btn.addEventListener('click',()=>{
            const[,id,status]=btn.getAttribute('data-decide').split(':');
            const row=state.elections.find(e=>e.id===id); if(row)row.status=status; render();
          });
        });
      }

      if(currentTab==='events'){
        byId('event-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const title=val('evt-title'),date=val('evt-date'); if(!title||!date)return;
          state.events.push({id:nextId('EVT',state.events),club:val('evt-club'),title,date,location:val('evt-location')});
          render();
        });
        byId('attendance-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const student=val('att-student'); if(!student)return;
          state.attendance.push({id:nextId('ATT',state.attendance),event:val('att-event'),student,status:val('att-status'),timeIn:val('att-timein')||'-',timeOut:val('att-timeout')||'-'});
          render();
        });
      }

      if(currentTab==='achievements'){
        byId('achievement-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const title=val('ach-title'),date=val('ach-date'); if(!title||!date)return;
          state.achievements.push({id:nextId('ACH',state.achievements),club:val('ach-club'),title,date,level:val('ach-level')});
          render();
        });
      }

      if(currentTab==='budget'){
        byId('budget-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const purpose=val('bud-purpose'),amount=val('bud-amount'); if(!purpose||!amount)return;
          state.budget.push({id:nextId('BUD',state.budget),club:val('bud-club'),purpose,amount,requested:today(),status:'pending'});
          render();
        });
        document.querySelectorAll('[data-decide]').forEach(btn=>{
          btn.addEventListener('click',()=>{
            const[,id,status]=btn.getAttribute('data-decide').split(':');
            const row=state.budget.find(b=>b.id===id); if(row)row.status=status; render();
          });
        });
      }

      /* ====== ANNOUNCEMENTS wiring — image upload ====== */
      if(currentTab==='announcements'){
        const imgInput = byId('ann-img');
        const previewArea = byId('ann-img-preview-area');
        const labelText = byId('ann-img-label-text');

        function clearPendingImg(){
          state._pendingAnnImg=null;
          previewArea.innerHTML='';
          if(labelText) labelText.textContent='Choose image or drag here';
          if(imgInput) imgInput.value='';
        }

        /* live preview when file chosen */
        imgInput?.addEventListener('change',()=>{
          const file=imgInput.files[0];
          if(!file){clearPendingImg();return;}
          const reader=new FileReader();
          reader.onload=ev=>{
            state._pendingAnnImg=ev.target.result;
            if(labelText) labelText.textContent=file.name;
            previewArea.innerHTML=`<div class="img-preview-wrap">
  <img src="${ev.target.result}" alt="Preview">
  <button type="button" class="remove-img" id="ann-remove-img" aria-label="Remove image">&times;</button>
</div>`;
            byId('ann-remove-img')?.addEventListener('click',clearPendingImg);
          };
          reader.readAsDataURL(file);
        });

        /* drag-and-drop onto the label */
        const uploadLabel = document.querySelector('label[for="ann-img"]');
        uploadLabel?.addEventListener('dragover',e=>{e.preventDefault();uploadLabel.style.borderColor='#64748b';});
        uploadLabel?.addEventListener('dragleave',()=>{uploadLabel.style.borderColor='';});
        uploadLabel?.addEventListener('drop',e=>{
          e.preventDefault();uploadLabel.style.borderColor='';
          const file=e.dataTransfer.files[0];
          if(!file||!file.type.startsWith('image/'))return;
          const dt=new DataTransfer();dt.items.add(file);imgInput.files=dt.files;
          imgInput.dispatchEvent(new Event('change'));
        });

        byId('announcement-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const sender=val('ann-sender'),content=val('ann-content');
          const hasImage=!!state._pendingAnnImg;
          if(!sender)return;
          if(!content&&!hasImage)return;
          state.announcements.unshift({
            id:nextId('ANN',state.announcements),
            club:val('ann-club'),sender,content,date:today(),
            image:state._pendingAnnImg||null,
          });
          clearPendingImg();
          render();
        });
      }

      if(currentTab==='volunteer'){
        byId('volunteer-form')?.addEventListener('submit',e=>{
          e.preventDefault();
          const student=val('vol-student'),hours=val('vol-hours'); if(!student||!hours)return;
          state.volunteer.push({id:nextId('VOL',state.volunteer),student,club:val('vol-club'),activity:val('vol-activity'),hours,date:today(),verifiedBy:val('vol-verified')});
          render();
        });
      }
    }

    render();
    </script>
  </body>
</html>
